name: ECR to EC2 Deploy

on:
  push:
    branches:
      - ECR_Deploy
    paths-ignore:
      - 'docs/**'
      - 'readme.md'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4                        # fixed: v6 does not exist

      - name: Set up AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4  # fixed: v6 does not exist
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-southeast-2

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ECR_REPOSITORY_URI }}:latest .